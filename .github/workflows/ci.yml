name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [landing, cliente, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        working-directory: apps/${{ matrix.app }}
        run: bunx tsc -p tsconfig.json --noEmit

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: bun run build
