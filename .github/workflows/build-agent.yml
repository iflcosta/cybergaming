name: Build Machine Agent (Windows)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/agent/**"
      - ".github/workflows/build-agent.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Write env
        working-directory: apps/agent
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=https://scrswxgvlwfndsqrclgb.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjcnN3eGd2bHdmbmRzcXJjbGdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTAwOTMsImV4cCI6MjA5OTI2NjA5M30.IHBXpiLtw2cLgbUWfbuNUs2-oN8H9zSggwFxLgdUM-Y" >> .env

      - name: Build Windows installer
        working-directory: apps/agent
        run: bun run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyber-brasil-arena-agent-windows
          path: apps/agent/dist/*.exe
          retention-days: 30
